repos:
  - repo: local
    hooks:
      - id: gdformat
        name: gdformat
        description: Format GDScript files
        entry: gdformat --check
        language: system
        files: '\.gd$'
        exclude: ^addons/
      - id: gdlint
        name: gdlint
        description: Lint GDScript files
        entry: gdlint
        language: system
        files: '\.gd$'
        exclude: ^addons/
