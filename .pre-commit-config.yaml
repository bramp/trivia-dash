repos:
  - repo: local
    hooks:
      - id: gdformat
        name: gdformat
        description: Check GDScript formatting
        entry: make format-check-gd
        language: system
        files: '\.gd$'
        exclude: ^(addons/|android/)
        pass_filenames: false

      - id: gdlint
        name: gdlint
        description: Lint GDScript files
        entry: make lint
        language: system
        files: '\.gd$'
        exclude: ^(addons/|android/)
        pass_filenames: false

      - id: gut-tests
        name: gut-tests
        description: Run GUT unit tests
        entry: make test
        language: system
        files: '\.gd$'
        exclude: ^(addons/|android/)
        pass_filenames: false

      - id: ruff
        name: ruff
        description: Check Python formatting and lint
        entry: make format-check-py
        language: system
        files: '\.py$'
        pass_filenames: false
