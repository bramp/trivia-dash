repos:
  - repo: local
    hooks:
      - id: gdformat
        name: gdformat
        description: Check GDScript formatting
        entry: make format-check
        language: system
        files: '\.gd$'
        exclude: ^addons/
        pass_filenames: false
      - id: gdlint
        name: gdlint
        description: Lint GDScript files
        entry: make lint
        language: system
        files: '\.gd$'
        exclude: ^addons/
        pass_filenames: false
      - id: gut-tests
        name: gut-tests
        description: Run GUT unit tests
        entry: make test
        language: system
        files: '\.gd$'
        exclude: ^addons/
        pass_filenames: false
      - id: ruff-format
        name: ruff-format
        description: Check Python formatting
        entry: ruff format --check
        language: system
        files: '\.py$'
        pass_filenames: true
      - id: ruff-lint
        name: ruff-lint
        description: Lint Python files
        entry: ruff check
        language: system
        files: '\.py$'
        pass_filenames: true
