name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint GDScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install gdtoolkit
        run: pip install "gdtoolkit>=4,<5"

      - name: Check formatting
        run: make format-check

      - name: Lint
        run: make lint

  test:
    name: Run GUT Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.0
          use-dotnet: false
          include-templates: false

      - name: Import project
        run: godot --headless --import . --quit || true
        timeout-minutes: 2

      - name: Run GUT tests
        run: make test
        timeout-minutes: 5

  build:
    name: Build Web Export
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Godot with export templates
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.0
          use-dotnet: false
          include-templates: true

      - name: Import project
        run: godot --headless --import . --quit || true
        timeout-minutes: 2

      - name: Build Web export
        run: make build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
