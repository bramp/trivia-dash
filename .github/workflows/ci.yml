name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "THIRD_PARTY_LICENSES"
      - ".gitignore"
      - ".editorconfig"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "THIRD_PARTY_LICENSES"
      - ".gitignore"
      - ".editorconfig"

jobs:
  lint:
    name: Lint GDScript
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Install gdtoolkit and ruff
        run: pip install "gdtoolkit>=4,<5" "ruff>=0.9"

      - name: ✨ Check formatting
        run: make format-check

      - name: 🔍 Lint
        run: make lint

  test-gd:
    name: Run GUT Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: 🔢 Get Godot version
        id: godot-version
        run: echo "version=$(cat .godot-version)" >> "$GITHUB_OUTPUT"

      - name: 🤖 Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ steps.godot-version.outputs.version }}
          use-dotnet: false
          include-templates: false

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 💾 Cache venv
        uses: actions/cache@v4
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: 🏗️ Import project
        run: godot --headless --import . --quit || true
        timeout-minutes: 2

      - name: 🧪 Run GUT tests
        run: make test-gd
        timeout-minutes: 5

  test-py:
    name: Run Python Tools Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 💾 Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: 🧪 Run Python tests
        run: make test-py

  build:
    name: Build Web Export
    runs-on: ubuntu-latest
    needs: [lint, test-gd, test-py]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: 🔢 Get Godot version
        id: godot-version
        run: echo "version=$(cat .godot-version)" >> "$GITHUB_OUTPUT"

      - name: 🤖 Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ steps.godot-version.outputs.version }}
          use-dotnet: false
          include-templates: true

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 💾 Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: 📦 Install binaryen (wasm-opt)
        run: npm install
        env:
          npm_config_ignore_scripts: "true"

      - name: 🛤️ Add binaryen to PATH
        run: echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - name: 🏗️ Import project
        run: godot --headless --import . --quit || true
        timeout-minutes: 2

      - name: 🚀 Build Web export
        run: make build-web

      - name: 📤 Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
