name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint GDScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install gdtoolkit and ruff
        run: pip install "gdtoolkit>=4,<5" "ruff>=0.9"

      - name: Check formatting
        run: make format-check

      - name: Lint
        run: make lint

  test-gd:
    name: Run GUT Tests
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.2
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install make and python
        run: apt-get update && apt-get install -y make python3-venv

      - name: Import project
        run: godot --headless --import . --quit || true
        timeout-minutes: 2

      - name: Run GUT tests
        run: make test-gd
        timeout-minutes: 5

  test-py:
    name: Run Python Tools Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Run Python tests
        run: make test-py

  build:
    name: Build Web Export
    runs-on: ubuntu-latest
    needs: [lint, test-gd, test-py]
    container:
      image: barichello/godot-ci:4.6.2
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install make, python, and npm
        run: apt-get update && apt-get install -y make python3-venv npm

      - name: Install binaryen (wasm-opt)
        run: npm install
        env:
          npm_config_ignore_scripts: "true"

      - name: Add binaryen to PATH
        run: echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Import project
        run: godot --headless --import . --quit || true
        timeout-minutes: 2

      - name: Build Web export
        run: make build-web

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
